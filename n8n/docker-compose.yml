version: "3.8"

services:
  n8n:
    image: n8nio/n8n:1.80.0
    restart: always
    ports:
      - "5678:5678"

    environment:
      - N8N_HOST=3x.2x9.11x.154 # enter your Ext ip 
      - N8N_PORT=5678
      - N8N_PROTOCOL=http

      - N8N_EDITOR_BASE_URL=http://3x.2x9.11x.154:5678   # enter your Ext ip 
      - N8N_PUBLIC_API_BASE_URL=http://3x.2x9.11x.154:5678 # enter your Ext ip
      - WEBHOOK_URL=http://3x.2x9.11x.154:5678/ # enter your Ext ip

      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=admin123

      - N8N_SECURE_COOKIE=false
      - TZ=Asia/Kolkata

    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
